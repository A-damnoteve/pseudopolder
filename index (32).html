function rowToDraft(r) {
  // Normalise picks: old format is flat array, new format is {1:[...], 2:[...]}
  const rawPicks = r.picks || [];
  const picksByGw = Array.isArray(rawPicks)
    ? { 1: rawPicks }  // legacy: treat flat array as gameweek 1
    : rawPicks;
  return { code: r.id, numPlayers: r.num_players, players: r.players,
           picksByGw,
           started: r.started, completed: r.completed,
           currentGameweek: r.current_gameweek || 1,
           captains: r.captains || {},
           // draftingGameweek: which gw is currently being drafted (null = not drafting)
           draftingGameweek: r.drafting_gameweek || null };
}
async function dbCreate(draft) {
  const { error } = await _sb.from("drafts").insert({
    id: draft.code, num_players: draft.numPlayers, players: draft.players,

async function dbLoad(code) {

  return rowToDraft(data);

async function dbPatch(code, patch) {

function dbSubscribe(code, cb) {
  const channel = _sb.channel("draft_" + code)
    .on("postgres_changes", { event: "UPDATE", schema: "public", table: "drafts", filter: "id=eq." + code },
      p => cb(rowToDraft(p.new)))
    .subscribe();
  return () => _sb.removeChannel(channel);
}

const TK = "https://gegevensmagazijn.tweedekamer.nl/OData/v4/2.0";

// Gameperiod = 14-day rolling window ending N periods ago.
// Period 1 = the most recent completed 14-day block (ends yesterday).
// This avoids empty weeks during recess and gives enough activity to score.
const PERIOD_DAYS = 14;

function gameweekDates(periodNumber, totalPeriods) {
  // periodNumber counts back from most recent: 1 = latest, 2 = one before, etc.
  const offset = totalPeriods - periodNumber; // 0 = latest period
  const now = new Date();
  const to = new Date(now);
  to.setDate(now.getDate() - 1 - (offset * PERIOD_DAYS)); // end = yesterday minus offset
  to.setHours(23,59,59,999);
  const from = new Date(to);
  from.setDate(to.getDate() - (PERIOD_DAYS - 1));
  from.setHours(0,0,0,0);
  const fmt = d => d.toLocaleDateString("nl-NL", {day:"numeric", month:"short"});
  return { from, to, label: fmt(from) + " – " + fmt(to) };
}

// Step 1: resolve our member objects (with fake fallback IDs) to real TK PersoonIds by name
async function resolveTKIds(members) {
  const map = new Map();
  const chunks = [];
  for (let i = 0; i < members.length; i += 5) chunks.push(members.slice(i, i+5));
  for (const chunk of chunks) {
    const filters = chunk.map(m => {
      const parts = m.naam.split(" ");
      const achternaam = parts[parts.length - 1].replace(/'/g, "''");
      // Also try 2-word achternaam (e.g. "El Boujdaini")
      const achternaam2 = parts.length > 2 ? parts.slice(-2).join(" ").replace(/'/g, "''") : null;
      const f1 = "Achternaam eq '" + achternaam + "'";
      const f2 = achternaam2 ? " or Achternaam eq '" + achternaam2 + "'" : "";
      return f1 + f2;
    }).join(" or ");
    const url = TK + "/Persoon?$filter=Verwijderd eq false and (" + filters + ")&$select=Id,Roepnaam,Tussenvoegsel,Achternaam&$top=100";
    try {
      const res = await fetch(url);
      if (!res.ok) { console.warn("[TK] Persoon fetch failed:", res.status, await res.text()); continue; }
      const data = await res.json();
      for (const m of chunk) {
        const norm = s => s.normalize("NFD").replace(/[̀-ͯ]/g, "").toLowerCase().replace(/[^a-z ]/g, "");
        const mNorm = norm(m.naam);
        const results = data.value || [];
        // Try 1: exact full name match
        let match = results.find(p => {
          const pNaam = [p.Roepnaam, p.Tussenvoegsel, p.Achternaam].filter(Boolean).join(" ");
          return norm(pNaam) === mNorm;
        });
        // Try 2: if only 1 result for this achternaam, use it
        if (!match && results.length === 1) match = results[0];
        // Try 3: match by achternaam + tussenvoegsel only (ignores roepnaam differences)
        if (!match) {
          const nameParts = m.naam.split(" ");
          const firstName = norm(nameParts[0]);
          match = results.find(p => {
            const pNorm = norm([p.Roepnaam, p.Tussenvoegsel, p.Achternaam].filter(Boolean).join(" "));
            const pAchternaam = norm([p.Tussenvoegsel, p.Achternaam].filter(Boolean).join(" "));
            const mAchternaam = norm(nameParts.slice(1).join(" "));
            // Match if achternaam matches AND first name starts with same letter
            return pAchternaam === mAchternaam && p.Roepnaam && norm(p.Roepnaam)[0] === firstName[0];
          });
        }
        if (match) map.set(m.id, match.Id);
        else console.warn("[TK] No match for:", m.naam);
      }
    } catch(e) { console.error("[TK] resolveTKIds chunk error:", e.message); }
  }
  return map;
}

async function fetchScoresFromTK(members, dateFrom, dateTo) {
  // members = [{id, naam, partij}] — our app's member objects
  const from = dateFrom.toISOString().split("T")[0];
  const to   = dateTo.toISOString().split("T")[0];

  // Resolve real TK UUIDs for all members
  const idMap = await resolveTKIds(members); // ourId -> tkId
  const tkToOur = new Map([...idMap.entries()].map(([ourId, tkId]) => [tkId, ourId]));
  const tkIdSet = new Set(idMap.values());

  // Initialise accumulator keyed by our IDs
  const acc = {};
  members.forEach(m => { acc[m.id] = { moties: 0, motiesCoSign: 0, vragen: 0, stemmingen: 0, debatten: 0 }; });

  if (tkIdSet.size === 0) {
    console.warn("[TK] No TK IDs resolved — check proxy");
    return acc;
  }

  // Query ZaakActor per person — filter by Persoon_Id, then check Zaak date
  // Much more efficient than fetching all moties and expanding
  // We collect all Zaak_Ids first, then fetch Zaak dates to filter by period

  try {
    // Step A: fetch all ZaakActor records for our members
    // Build filter: Persoon_Id eq X or Persoon_Id eq Y ...
    const tkIds = [...tkIdSet];
    const idFilters = tkIds.map(id => "Persoon_Id eq " + id).join(" or ");

    // Fetch ZaakActor in chunks of 5 IDs (node limit) with pagination per chunk
    let allZaakActors = [];
    const tkIdChunks = [];
    for (let i = 0; i < tkIds.length; i += 5) tkIdChunks.push(tkIds.slice(i, i + 5));
    for (const chunk of tkIdChunks) {
      const chunkFilter = chunk.map(id => "Persoon_Id eq " + id).join(" or ");
      let nextUrl = TK + "/ZaakActor?$filter=Verwijderd eq false and (" + chunkFilter + ")&$select=Persoon_Id,Relatie,Zaak_Id&$top=250";
      while (nextUrl) {
        const res = await fetch(nextUrl);
        if (!res.ok) { const err = await res.text(); console.error("[TK] ZaakActor error:", err); break; }
        const data = await res.json();
        allZaakActors = allZaakActors.concat(data.value || []);
        nextUrl = data["@odata.nextLink"] || null;
      }
    }
    const zaakActorFinal = { value: allZaakActors };

    // Step B: get unique Zaak_Ids and fetch their Soort + GestartOp
    const zaakIds = [...new Set((zaakActorFinal.value || []).map(a => a.Zaak_Id).filter(Boolean))];

    // Fetch in batches of 20
    const zaakMap = new Map(); // zaakId -> {soort, datum}
    for (let i = 0; i < zaakIds.length; i += 20) {
      const batch = zaakIds.slice(i, i + 20);
      const f = batch.map(id => "Id eq " + id).join(" or ");
      const zRes = await fetch(TK + "/Zaak?$filter=" + f + "&$select=Id,Soort,GestartOp&$top=20");
      if (!zRes.ok) continue;
      const zData = await zRes.json();
      for (const z of (zData.value || [])) {
        const d = (z.GestartOp || "").substring(0, 10);
        zaakMap.set(z.Id, { soort: z.Soort, datum: d });
      }
    }

    // Step C: score — match ZaakActor to Zaak, check date and soort
    for (const actor of (zaakActorFinal.value || [])) {
      const zaak = zaakMap.get(actor.Zaak_Id);
      if (!zaak || !zaak.datum) continue;
      if (zaak.datum < from || zaak.datum > to) continue;
      const ourId = tkToOur.get(actor.Persoon_Id);
      if (!ourId) continue;
      if (zaak.soort === "Motie") {
        if (actor.Relatie === "Indiener") acc[ourId].moties++;
        else if (actor.Relatie === "Medeindiener") acc[ourId].motiesCoSign++;
      } else if (zaak.soort === "Schriftelijke vragen") {
        if (actor.Relatie === "Indiener") acc[ourId].vragen++;
      }
    }

    // DEBATTEN — query Activiteit by date range first, then match ActiviteitActor
    // Step 1: get all Activiteit IDs in our date range
    let activiteitIds = [];
    let nextActUrl = TK + "/Activiteit?$filter=Verwijderd eq false and Datum ge " + from + " and Datum le " + to + "&$select=Id&$top=250";
    while (nextActUrl) {
      const res = await fetch(nextActUrl);
      if (!res.ok) { console.warn("[TK] Activiteit fetch error:", res.status, await res.text()); break; }
      const data = await res.json();
      activiteitIds = activiteitIds.concat((data.value || []).map(a => a.Id));
      nextActUrl = data["@odata.nextLink"] || null;
    }

    // Step 2: for each activiteit, check if any of our members participated
    const tkIdSet2 = new Set(tkIds);
    for (let i = 0; i < activiteitIds.length; i += 5) {
      const batch = activiteitIds.slice(i, i + 5);
      const actFilter = batch.map(id => "Activiteit_Id eq " + id).join(" or ");
      const res = await fetch(TK + "/ActiviteitActor?$filter=Verwijderd eq false and Relatie eq 'Deelnemer' and (" + actFilter + ")&$select=Persoon_Id,Activiteit_Id&$top=250");
      if (!res.ok) continue;
      const data = await res.json();
      for (const a of (data.value || [])) {
        if (!tkIdSet2.has(a.Persoon_Id)) continue;
        const ourId = tkToOur.get(a.Persoon_Id);
        if (ourId) acc[ourId].debatten++;
      }
    }

  } catch(e) { console.error("[TK] scoring error:", e.message); }
  return acc;
}

function calcPoints(activity, isKapitein) {
  let pts = activity.moties * 6 + activity.motiesCoSign * 2 + activity.vragen * 4 + activity.stemmingen * 1 + activity.debatten * 5;
  if (isKapitein) pts *= 2;
  return pts;
}

function snakeOrder(np, ts) {
  const o = [];
  for (let r=0;r<ts;r++) { const row=Array.from({length:np},(_,i)=>i); if(r%2)row.reverse(); o.push(...row); }
  return o;
}

function DraftScreen({draft, setDraft, mps, currentPlayer, onDraftComplete}) {
  const [search, setSearch] = useState(""); const [filter, setFilter] = useState("alle");
  const [timeLeft, setTimeLeft] = useState(PICK_SECONDS);
  const timerRef=useRef(null); const botRef=useRef(null); const botBusy=useRef(false);
  const gw = draft.draftingGameweek || draft.currentGameweek || 1;
  const gwPicks = (draft.picksByGw && draft.picksByGw[gw]) || [];
  const totalPicks=TEAM_SIZE*draft.players.length, order=snakeOrder(draft.players.length,TEAM_SIZE);
  const idx=gwPicks.length, isDone=idx>=totalPicks;
  const pickerIdx=isDone?-1:order[idx], picker=isDone?null:draft.players[pickerIdx];
  const isMyTurn=picker?.name===currentPlayer, isBot=!!picker?.isBot;
  const pickedIds=new Set(gwPicks.map(p=>p.mpId));
  const round=Math.min(Math.floor(idx/draft.players.length)+1,TEAM_SIZE);
  const parties=["alle",...new Set(mps.map(m=>m.partij))].sort((a,b)=>a==="alle"?-1:a.localeCompare(b));
  const doPick=useCallback(async(mp,pickerName)=>{
    const newPicks=[...gwPicks,{mpId:mp.id,playerName:pickerName,pickNumber:gwPicks.length}];
    const completed=newPicks.length>=totalPicks;
    const newPicksByGw={...(draft.picksByGw||{}), [gw]: newPicks};
    setDraft(d=>({...d,picksByGw:newPicksByGw,...(completed?{completed:true}:{})}));
    try{await dbPatch(draft.code,{picks:newPicksByGw,...(completed?{completed:true}:{})});}catch(e){console.error(e);}
    if(completed)setTimeout(onDraftComplete,600);
  },[draft,gwPicks,gw,totalPicks,onDraftComplete,setDraft]);
  useEffect(()=>{
    if(isDone||!isBot||botBusy.current)return;
    botBusy.current=true;
    botRef.current=setTimeout(async()=>{
      const avail=mps.filter(m=>!pickedIds.has(m.id));
      if(avail.length>0)await doPick(avail[Math.floor(Math.random()*avail.length)],picker.name);
      botBusy.current=false;
    },BOT_DELAY);
    return()=>{clearTimeout(botRef.current);botBusy.current=false;};
  },[idx,isDone,isBot]);
  useEffect(()=>{
    setTimeLeft(PICK_SECONDS); if(timerRef.current)clearInterval(timerRef.current);
    if(!isDone&&!isBot){timerRef.current=setInterval(()=>{setTimeLeft(t=>{if(t<=1){clearInterval(timerRef.current);if(isMyTurn){const a=mps.filter(m=>!pickedIds.has(m.id));if(a.length)doPick(a[Math.floor(Math.random()*a.length)],currentPlayer);}return 0;}return t-1;});},1000);}
    return()=>clearInterval(timerRef.current);
  },[idx,isDone,isBot]);
  const filtered=mps.filter(m=>!pickedIds.has(m.id)&&(m.naam.toLowerCase().includes(search.toLowerCase())||m.partij.toLowerCase().includes(search.toLowerCase()))&&(filter==="alle"||m.partij===filter));
  const teams=draft.players.map(p=>({...p,picks:gwPicks.filter(pk=>pk.playerName===p.name).map(pk=>mps.find(m=>m.id===pk.mpId)).filter(Boolean)}));
  return (
    <div className="flex flex-col" style={{height:"calc(100vh - 53px)"}}>
      <div className="bg-gray-900 border-b border-gray-800 px-4 py-2.5 flex items-center gap-4 flex-shrink-0">
        <span className="font-display font-bold text-white text-sm">Ronde {round}/{TEAM_SIZE}</span>
        <span className="text-gray-600 text-xs">Pick {idx+1}/{totalPicks}</span>
        <div className="flex-1 bg-gray-800 rounded-full h-1.5"><div style={{width:(idx/totalPicks*100)+"%"}} className="bg-indigo-500 h-1.5 rounded-full transition-all duration-500"/></div>
        {!isDone&&<div className={"px-3 py-1 rounded-full text-xs font-bold "+(timeLeft<=300&&!isBot?"bg-red-900 text-red-300 animate-pulse":isBot?"bg-gray-800 text-gray-400":"bg-gray-800 text-gray-300")}>{isBot?"🤖 …":"⏱ "+fmtTimer(timeLeft)}</div>}
      </div>
      <div className="flex flex-1 overflow-hidden">
        <div className="flex-1 flex flex-col overflow-hidden">
          {!isDone&&<div className={"px-4 py-2.5 flex-shrink-0 border-b "+(isMyTurn?"bg-indigo-950 border-indigo-800":"bg-gray-900 border-gray-800")}>
            {isBot?<p className="text-gray-400 text-sm flex items-center gap-2"><span className="inline-block w-3 h-3 border-2 border-gray-500 border-t-transparent rounded-full animate-spin"/>{picker.name} denkt na…</p>
            :isMyTurn?<p className="text-indigo-300 font-semibold text-sm">🎯 Jouw beurt — klik op een Kamerlid</p>
            :<p className="text-gray-400 text-sm">⌛ Wacht op <span className="text-white font-semibold">{picker?.name}</span>…</p>}
          </div>}
          {isDone&&<div className="px-4 py-3 bg-emerald-950 border-b border-emerald-800 flex-shrink-0"><p className="text-emerald-300 font-semibold">🎉 Draft voltooid! Ga naar Scores →</p></div>}
          {!isDone&&<div className="px-3 pt-2.5 pb-1 flex-shrink-0 space-y-2">
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Zoek Kamerlid of partij…" className="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2 text-white text-sm placeholder-gray-500 focus:outline-none focus:border-indigo-500"/>
            <div className="flex gap-1.5 overflow-x-auto pb-1 scrollbar-hide">
              {parties.map(p=><button key={p} onClick={()=>setFilter(p)} style={filter===p&&p!=="alle"?{background:pc(p),borderColor:pc(p)}:{}} className={"flex-shrink-0 px-2.5 py-1 rounded-full text-xs font-semibold border transition-all "+(filter===p?(p==="alle"?"bg-indigo-600 border-indigo-600 text-white":"text-white"):"bg-gray-800 border-gray-700 text-gray-400")}>{p}</button>)}
            </div>
          </div>}
          <div className="flex-1 overflow-y-auto scrollbar-hide">
            {filtered.map(mp=><MPRow key={mp.id} mp={mp} onPick={isMyTurn&&!isBot?m=>doPick(m,currentPlayer):null} picked={false}/>)}
            {filtered.length===0&&<p className="text-gray-600 text-sm text-center py-10">Geen Kamerleden gevonden</p>}
          </div>
        </div>
        <div className="w-52 border-l border-gray-800 flex-shrink-0 flex flex-col bg-gray-950 overflow-hidden">
          <div className="px-3 py-2.5 border-b border-gray-800"><p className="font-display font-bold text-white text-xs uppercase tracking-wider">Teams</p></div>
          <div className="flex-1 overflow-y-auto scrollbar-hide divide-y divide-gray-800">
            {teams.map((team,i)=>{const cur=team.name===picker?.name&&!isDone;return(
              <div key={i} className={"p-3 "+(cur?"bg-indigo-950":"")}>
                <div className="flex items-center gap-2 mb-2"><Av name={team.name} size="sm" bot={team.isBot}/><p className="text-white text-xs font-semibold truncate flex-1">{team.name}</p>{cur&&<div className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"/>}</div>
                <div className="space-y-1">
                  {team.picks.map(mp=>mp&&<MPSmall key={mp.id} mp={mp}/>)}
                  {Array.from({length:TEAM_SIZE-team.picks.length}).map((_,j)=><div key={j} className="h-8 rounded-lg border border-dashed border-gray-800/60 flex items-center justify-center"><span className="text-gray-800 text-xs">{team.picks.length+j+1}</span></div>)}
                </div>
              </div>
            );})}
          </div>
        </div>
      </div>
    </div>
  );
}


function TotaalStand({draft, gw}) {
  const [totals, setTotals] = React.useState(null);
  React.useEffect(() => {
    async function load() {
      const { data } = await _sb.from("gameweek_scores")
        .select("player_name, gameweek, total_pts")
        .eq("draft_id", draft.code);
      if (!data) return;
      const map = {};
      for (const row of data) {
        if (!map[row.player_name]) map[row.player_name] = 0;
        map[row.player_name] += row.total_pts || 0;
      }
      setTotals(Object.entries(map).sort((a,b) => b[1]-a[1]));
    }
    load();
  }, [gw]);
  if (!totals) return <p className="text-gray-500 text-xs">Laden...</p>;
  const medals = ["🥇","🥈","🥉"];
  return <div className="space-y-1">
    {totals.map(([name, pts], i) => (
      <div key={name} className="flex items-center justify-between">
        <span className="text-white text-sm">{medals[i]||"  "} {name}</span>
        <span className="text-indigo-400 font-bold text-sm">{pts} pts</span>
      </div>
    ))}
  </div>;
}



function ScoresScreen({draft, setDraft, mps, currentPlayer}) {
  const [scores, setScores] = useState(null);
  const [status, setStatus] = useState("idle");
  const [errorMsg, setErrorMsg] = useState("");
  const [gw, setGw] = useState(draft.currentGameweek||1);
  const [expanded, setExpanded] = useState(null);
  const [captains, setCaptains] = useState(draft.captains||{});
  const [editingCaptain, setEditingCaptain] = useState(false);
  const scoringGwPicks = (draft.picksByGw && draft.picksByGw[gw]) || [];
  const myTeam=scoringGwPicks.filter(pk=>pk.playerName===currentPlayer).map(pk=>mps.find(m=>m.id===pk.mpId)).filter(Boolean);
  const myCaptainId=captains[currentPlayer]||myTeam[0]?.id;

  const saveCaptain=async(mpId)=>{
    const nc={...captains,[currentPlayer]:mpId};
    setCaptains(nc);
    try{await dbPatch(draft.code,{captains:nc});setDraft(d=>({...d,captains:nc}));}catch(e){console.error(e);}
    setEditingCaptain(false);
  };

  const computeScores=useCallback(async()=>{
    setStatus("loading"); setErrorMsg("");
    try {
      const saved=await dbLoadScores(draft.code,gw);
      if(saved&&saved.length===draft.players.length){
        setScores(saved.map(row=>({player:row.player_name,total:row.total_pts,bd:row.scores_json,fromCache:true})).sort((a,b)=>b.total-a.total));
        setStatus("done"); return;
      }
    } catch(e){}
    const allMpIds=scoringGwPicks.map(pk=>pk.mpId);
    const allMembers=allMpIds.map(id=>mps.find(m=>m.id===id)).filter(Boolean);
    let activities;
    try {
      const dates=gameweekDates(gw, draft.currentGameweek||1);
      activities=await fetchScoresFromTK(allMembers,dates.from,dates.to);
    } catch(e){ setStatus("error"); setErrorMsg("TK API niet bereikbaar."); return; }
    const result=await Promise.all(draft.players.map(async p=>{
      const team=scoringGwPicks.filter(pk=>pk.playerName===p.name).map(pk=>mps.find(m=>m.id===pk.mpId)).filter(Boolean);
      const capId=captains[p.name]||team[0]?.id;
      let total=0;
      const bd=team.map(mp=>{const act=activities[mp.id]||{moties:0,motiesCoSign:0,vragen:0,stemmingen:0,debatten:0};const isK=mp.id===capId;const pts=calcPoints(act,isK);total+=pts;return{mpId:mp.id,naam:mp.naam,partij:mp.partij,isK,pts,...act};});
      try{await dbSaveScores(draft.code,gw,p.name,bd,total);}catch(e){}
      return{player:p.name,total,bd};
    }));
    setScores(result.sort((a,b)=>b.total-a.total)); setStatus("done");
  },[draft,mps,gw,captains]);

  const gwDates=gameweekDates(gw, draft.currentGameweek||1);
  const M=["🥇","🥈","🥉"];
  return (
    <div className="max-w-2xl mx-auto space-y-5 pb-16">
      <div className="flex items-center justify-between">
        <h2 className="font-display text-2xl font-bold text-white">Ranglijst</h2>
        <div className="flex items-center gap-2">
          <select value={gw} onChange={e=>{setGw(+e.target.value);setScores(null);setStatus("idle");}} className="bg-gray-800 border border-gray-700 rounded-xl px-3 py-1.5 text-white text-sm">
            {Array.from({length:draft.currentGameweek||1},(_,i)=>i+1).map(w=><option key={w} value={w}>Periode {w}</option>)}
          </select>
          <button onClick={computeScores} disabled={status==="loading"} className="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white text-sm font-bold px-4 py-1.5 rounded-xl">{status==="loading"?"⏳ Laden…":"🔄 Bereken"}</button>
        </div>
      </div>
      <div className="flex items-center justify-between">
        <p className="text-gray-500 text-xs">📅 {gwDates.label} · 14 dagen · TK open data</p>
        {currentPlayer===draft.players[0]?.name&&<button onClick={async()=>{
          const ng=(draft.currentGameweek||1)+1;
          await dbPatch(draft.code,{current_gameweek:ng, drafting_gameweek:ng, completed:false});
          setDraft(d=>({...d,currentGameweek:ng,draftingGameweek:ng,completed:false}));
          setGw(ng);setScores(null);setStatus("idle");
          setScreen("draft");
        }} className="text-xs text-emerald-400 hover:text-emerald-300 bg-emerald-950/40 border border-emerald-800/50 px-3 py-1 rounded-full">🐍 Nieuwe draft (periode {(draft.currentGameweek||1)+1})</button>}
      </div>
      <div className="bg-gray-900 border border-gray-800 rounded-2xl p-4">
        <div className="flex items-center justify-between mb-3">
          <p className="font-display font-bold text-white text-sm">© Aanvoerder periode {gw}</p>
          <button onClick={()=>setEditingCaptain(!editingCaptain)} className="text-xs text-indigo-400 hover:text-indigo-300">{editingCaptain?"Annuleer":"Wijzig"}</button>
        </div>
        {editingCaptain?(
          <div className="space-y-1">
            <p className="text-gray-500 text-xs mb-2">Kies aanvoerder — scoort 2× in periode {gw}</p>
            {myTeam.map(mp=><button key={mp.id} onClick={()=>saveCaptain(mp.id)} className={"w-full flex items-center gap-3 px-3 py-2 rounded-xl border text-left transition-all "+(myCaptainId===mp.id?"border-amber-600 bg-amber-950/30":"border-gray-700 hover:border-indigo-500")}>
              <div style={{background:pc(mp.partij)}} className="w-1 h-7 rounded-full"/>
              <div className="flex-1"><p className="text-white text-sm font-medium">{mp.naam}</p><p style={{color:pc(mp.partij)}} className="text-xs">{mp.partij}</p></div>
              {myCaptainId===mp.id&&<span className="text-amber-400 font-bold">© 2×</span>}
            </button>)}
          </div>
        ):(()=>{const cap=myTeam.find(m=>m.id===myCaptainId);return cap?(<div className="flex items-center gap-3"><div style={{background:pc(cap.partij)}} className="w-1 h-8 rounded-full"/><div><p className="text-white font-semibold text-sm">{cap.naam}</p><Pill p={cap.partij}/></div><span className="ml-auto text-amber-400 font-bold text-sm">© 2×</span></div>):(<p className="text-gray-500 text-sm">Nog geen aanvoerder</p>);})()}
      </div>
      {status==="idle"&&(scoringGwPicks.length===0?<div className="text-center py-16 space-y-4"><div className="text-5xl">🗓️</div><p className="text-gray-400 font-medium">Periode {gw} is nog niet gedraft</p><p className="text-gray-600 text-sm">De host kan een nieuwe draft starten vanuit de vorige periode</p></div>:<div className="text-center py-16 space-y-4"><div className="text-5xl">📊</div><p className="text-gray-500">Bereken scores op basis van echte parlementaire activiteit</p><button onClick={computeScores} className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-8 py-3 rounded-xl">Scores berekenen</button></div>)}
      {status==="loading"&&<div className="text-center py-16 space-y-3"><div className="inline-block w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"/><p className="text-gray-400 font-medium">Data ophalen van Tweede Kamer API…</p><p className="text-gray-600 text-xs">Stap 1: Kamerleden opzoeken · Stap 2: Moties · Kamervragen · Stemmingen · Debatten</p></div>}
      {status==="error"&&<div className="bg-red-950/40 border border-red-800 rounded-xl p-4 text-red-300 text-sm">⚠️ {errorMsg}</div>}
      {status==="done"&&scores&&<div className="space-y-3">
        {scores[0]?.fromCache&&<p className="text-gray-600 text-xs text-center">📦 Opgeslagen scores</p>}
        <div className="grid grid-cols-3 gap-2">{scores.slice(0,3).map((e,i)=><div key={e.player} className={"rounded-2xl p-4 text-center border "+(i===0?"bg-amber-950/40 border-amber-700":"bg-gray-900 border-gray-800")}><div className="text-2xl mb-1">{M[i]}</div><p className="text-white font-display font-bold text-sm truncate">{e.player}</p><p className={"font-black text-xl "+(i===0?"text-amber-400":"text-white")}>{e.total}</p><p className="text-gray-500 text-xs">punten</p></div>)}</div>
        {scores.map((entry,rank)=><div key={entry.player} className="bg-gray-900 rounded-2xl border border-gray-800 overflow-hidden">
          <button onClick={()=>setExpanded(expanded===rank?null:rank)} className="w-full px-4 py-3.5 flex items-center justify-between hover:bg-gray-800/50">
            <div className="flex items-center gap-3"><span className="font-display font-black text-lg w-8 text-left" style={{color:rank===0?"#fbbf24":rank===1?"#9ca3af":rank===2?"#b45309":"#6b7280"}}>#{rank+1}</span><Av name={entry.player} bot={entry.player.startsWith("Bot")}/><span className="text-white font-semibold">{entry.player}</span></div>
            <div className="flex items-center gap-2"><span className="font-display font-black text-xl text-white">{entry.total} <span className="text-gray-600 text-sm font-normal">pts</span></span><span className="text-gray-600 text-xs">{expanded===rank?"▲":"▼"}</span></div>
          </button>
          {expanded===rank&&<div className="border-t border-gray-800 divide-y divide-gray-800">
            {entry.bd.map(row=>{const mp=mps.find(m=>m.id===row.mpId)||{naam:row.naam,partij:row.partij};return(
              <div key={row.mpId} className="px-4 py-2.5 flex items-center justify-between">
                <div className="flex items-center gap-2"><div style={{background:pc(mp.partij)}} className="w-1 h-8 rounded-full"/>
                  <div><div className="flex items-center gap-1.5"><p className="text-white text-xs font-semibold">{mp.naam}</p>{row.isK&&<span className="text-xs bg-amber-900/50 text-amber-400 px-1.5 py-0.5 rounded">© 2×</span>}</div>
                    <p className="text-gray-600 text-xs mt-0.5">{[row.moties>0&&row.moties+"× motie",row.motiesCoSign>0&&row.motiesCoSign+"× co-motie",row.vragen>0&&row.vragen+"× vraag",row.stemmingen>0&&row.stemmingen+"× stem",row.debatten>0&&row.debatten+"× debat"].filter(Boolean).join(" · ")||"geen activiteit"}</p>
                  </div>
                </div>
                <span className="text-indigo-400 font-bold text-sm">{row.pts} pts</span>
              </div>
            );})}
          </div>}
        </div>)}
        {draft.currentGameweek > 1 && <div className="bg-gray-900 rounded-2xl border border-gray-800 p-4">
          <p className="font-display font-bold text-white text-sm mb-3">🏆 Totaalstand</p>
          <TotaalStand draft={draft} gw={gw} />
        </div>}
        {(draft.currentGameweek||1) > 1 && <div className="bg-gray-900 rounded-2xl border border-gray-800 p-4">
          <p className="font-display font-bold text-white text-sm mb-3">🏆 Totaalstand</p>
          <TotaalStand draft={draft} gw={gw} />
        </div>}
        {(draft.currentGameweek||1) > 1 && <div className="bg-gray-900 rounded-2xl border border-gray-800 p-4">
          <p className="font-display font-bold text-white text-sm mb-3">🏆 Totaalstand</p>
          <TotaalStand draft={draft} gw={gw} />
        </div>}
        <div className="bg-gray-900 rounded-2xl border border-gray-800 p-4"><p className="font-display font-bold text-white text-sm mb-3">Puntensysteem</p>
          <div className="grid grid-cols-2 gap-2">
            {Object.values(SCORING).map(s=><div key={s.label} className="flex items-center justify-between bg-gray-800 rounded-xl px-3 py-2"><span className="text-gray-400 text-xs">{s.icon} {s.label}</span><span className="text-indigo-400 font-bold text-sm ml-2">{s.points}</span></div>)}
            <div className="flex items-center justify-between bg-amber-900/30 border border-amber-800/50 rounded-xl px-3 py-2 col-span-2"><span className="text-amber-300 text-xs">© Aanvoerder bonus</span><span className="text-amber-400 font-bold text-sm">2×</span></div>
          </div>
        </div>
      </div>}
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("home");
  const [draft, setDraft] = useState(null);
  const [currentPlayer, setCurrentPlayer] = useState(null);
  const [mps, setMps] = useState([]);
  const [loadingMPs, setLoadingMPs] = useState(false);
  const [actionLoading, setActionLoading] = useState(false);
  const unsubRef = useRef(null);
  useEffect(()=>{setLoadingMPs(true);fetchKamerleden().then(d=>{setMps(d);setLoadingMPs(false);});},[]);
  const subscribe=useCallback((code)=>{
    if(unsubRef.current)unsubRef.current();
    unsubRef.current=dbSubscribe(code,updated=>{setDraft(updated);if(updated.completed)setScreen("scores");else if(updated.started)setScreen("draft");});
  },[]);
  useEffect(()=>{
    const p=new URLSearchParams(window.location.search); const j=p.get("join");
    if(j){const name=prompt("Uitgenodigd voor league "+j+". Jouw naam?");if(name?.trim())handleJoinDraft(name.trim(),j).catch(e=>alert(e.message));}
  },[]);
  const handleCreateDraft=async(name,numPlayers)=>{
    setActionLoading(true);
    try {
      const code=genCode();
      const d={code,numPlayers,players:[{name}],picks:[],started:false,completed:false,currentGameweek:1,captains:{}};
      await dbCreate(d);
      setDraft(d); setCurrentPlayer(name); setScreen("lobby"); subscribe(code);
    } catch(e) {
      console.error("Create draft error:", e);
      alert("Kon league niet aanmaken: " + (e.message||e));
    } finally { setActionLoading(false); }
  };
  const handleJoinDraft=async(name,code)=>{
    setActionLoading(true); const ex=await dbLoad(code);
    const already=ex.players.find(p=>p.name===name);
    if(already){setDraft(ex);setCurrentPlayer(name);setScreen(ex.completed?"scores":ex.started?"draft":"lobby");subscribe(code);setActionLoading(false);return;}
    if(ex.players.length>=ex.numPlayers)throw new Error("League is vol!");
    const players=[...ex.players,{name}];
    await dbPatch(code,{players}); setDraft({...ex,players}); setCurrentPlayer(name); setScreen("lobby"); subscribe(code); setActionLoading(false);
  };
  const handleAddBot=async()=>{
    const bots=["Bot Rutte","Bot Kaag","Bot Baudet","Bot Omtzigt","Bot Wilders"];
    const used=draft.players.map(p=>p.name); const bot=bots.find(b=>!used.includes(b));
    if(!bot||draft.players.length>=draft.numPlayers)return;
    const players=[...draft.players,{name:bot,isBot:true}];
    await dbPatch(draft.code,{players}); setDraft(d=>({...d,players}));
  };
  const handleStart=async()=>{await dbPatch(draft.code,{started:true,drafting_gameweek:1});setDraft(d=>({...d,started:true,draftingGameweek:1}));setScreen("draft");};
  const handleReset=()=>{if(!confirm("Wil je opnieuw beginnen?"))return;if(unsubRef.current)unsubRef.current();setDraft(null);setCurrentPlayer(null);setScreen("home");window.history.replaceState({},"",window.location.pathname);};
  const totalPicks=draft?TEAM_SIZE*draft.players.length:0;
  const draftDone=draft?draft.picks.length>=totalPicks:false;
  return (
    <div className="min-h-screen bg-gray-950 text-white">
      {draft&&<nav className="bg-gray-900/80 backdrop-blur border-b border-gray-800 px-4 py-2.5 flex items-center justify-between sticky top-0 z-10">
        <div className="flex items-center gap-0.5">
          <span className="font-display font-black text-white mr-3">Pseudopolder</span>
          {[{id:"lobby",label:"Lobby",dis:false},{id:"draft",label:"Draft",dis:!draft.started},{id:"scores",label:"Scores",dis:!draftDone}].map(t=>(
            <button key={t.id} onClick={()=>!t.dis&&setScreen(t.id)} disabled={t.dis} className={"px-3 py-1.5 rounded-lg text-sm font-medium transition-colors "+(screen===t.id?"bg-indigo-600 text-white":t.dis?"text-gray-700 cursor-not-allowed":"text-gray-400 hover:text-white hover:bg-gray-800")}>{t.label}</button>
          ))}
        </div>
        <div className="flex items-center gap-3">
          {loadingMPs&&<span className="text-gray-700 text-xs animate-pulse">laden…</span>}
          <span className="text-gray-600 text-xs font-mono hidden sm:block">{draft.code}</span>
          {currentPlayer&&<span className="text-gray-500 text-xs hidden sm:block">{currentPlayer}</span>}
          <button onClick={handleReset} className="text-gray-700 hover:text-gray-400 text-xs">↺</button>
        </div>
      </nav>}
      <div className={screen==="draft"?"":"px-4 py-10"}>
        {screen==="home"&&<HomeScreen onCreateDraft={handleCreateDraft} onJoinDraft={handleJoinDraft} loading={actionLoading}/>}
        {screen==="lobby"&&draft&&<LobbyScreen draft={draft} currentPlayer={currentPlayer} onStart={handleStart} onAddBot={handleAddBot}/>}
        {screen==="draft"&&draft&&mps.length>0&&<DraftScreen draft={draft} setDraft={setDraft} mps={mps} currentPlayer={currentPlayer} onDraftComplete={()=>setScreen("scores")}/>}
        {screen==="scores"&&draft&&mps.length>0&&<ScoresScreen draft={draft} setDraft={setDraft} mps={mps} currentPlayer={currentPlayer}/>}
      </div>
    </div>
  );
}
class ErrorBoundary extends React.Component {
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  render(){
    if(this.state.err) return (
      <div className="min-h-screen bg-gray-950 flex items-center justify-center p-8">
        <div className="bg-red-950/50 border border-red-800 rounded-2xl p-6 max-w-md text-center space-y-3">
          <div className="text-4xl">⚠️</div>
          <p className="text-red-300 font-bold font-display text-lg">Er ging iets mis</p>
          <p className="text-red-400 text-sm font-mono">{this.state.err.message}</p>
          <p className="text-gray-500 text-xs">Controleer je Supabase API key en probeer opnieuw.</p>
          <button onClick={()=>window.location.reload()} className="bg-red-800 hover:bg-red-700 text-white px-4 py-2 rounded-xl text-sm">↺ Herladen</button>
        </div>
      </div>
    );
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
